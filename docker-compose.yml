services:
  # Main API Gateway / Server
  api-server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/collab-platform
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - PORT=5000
    depends_on:
      - mongo
      - redis

  # Yjs Sync Server
  ws-server:
    build:
      context: ./ws-server
    ports:
      - "1234:1234"
    environment:
      - PORT=1234
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  # Terminal Service
  terminal-service:
    build:
      context: ./terminal-service
    ports:
      - "4000:4000"
    environment:
      - PORT=4000

  # Execution Service
  execution-service:
    build:
      context: ./execution-service
    ports:
      - "5001:5001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=5001

  # Databases
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  mongo-data:
